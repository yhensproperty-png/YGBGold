    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #b8960c; }

        .scrollbar-thin::-webkit-scrollbar { width: 8px; }

        /* ── Hero text animations ── */
        @keyframes heroFadeUp {
            0%   { opacity: 0; transform: translateY(35px); filter: blur(12px); }
            60%  { opacity: 0.8; filter: blur(2px); }
            100% { opacity: 1; transform: translateY(0);    filter: blur(0px); }
        }

        .hero-line-1 {
            opacity: 0;
            animation: heroFadeUp 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.5s forwards;
        }

        .hero-line-2 {
            opacity: 0;
            color: #D4AF37 !important;
            text-shadow: 0 0 40px rgba(212,175,55,0.6), 0 4px 12px rgba(0,0,0,0.9) !important;
            animation: heroFadeUp 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.0s forwards;
        }

        /* ── Scroll-reveal animations ── */
        @keyframes scrollFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .scroll-reveal { opacity: 0; }
        .scroll-reveal.visible { animation: scrollFadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    </style>
